name: sentinel
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.5.0
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.10
  firebase_storage: ^12.4.0
  cloud_functions: ^5.1.3
  flutter:
    sdk: flutter
  geolocator: ^13.0.0
  google_maps_flutter: ^2.17.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  record: ^6.2.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  workmanager: ^0.9.0+3
  sensors_plus: ^3.1.0
  image_picker: ^1.0.7
  intl_phone_field: ^3.2.0
  audioplayers: ^6.1.0
  speech_to_text: ^7.0.0
  vibration: ^3.1.0
  http: ^1.6.0
  battery_plus: ^7.0.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.1.2
  flutter_background_service: ^5.0.5
  device_info_plus: ^10.1.0
  quick_actions: ^1.0.9
  camera: ^0.12.0+1
  path: ^1.9.1
  crypto: ^3.0.7
  flutter_phone_direct_caller: ^2.2.1
  permission_handler: ^12.0.1
  flutter_volume_controller: ^1.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.25.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_logo.png"
    background_color: "#0D0D1A"
    theme_color: "#E91E63"
  image_path: "assets/icon/app_logo.png"
  # You can also use separate icons for android and ios:
  # image_path_android: "assets/icon/app_logo_android.png"
  # image_path_ios: "assets/icon/app_logo_ios.png"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
